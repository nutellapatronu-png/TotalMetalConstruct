<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Metal Construct</title>
    <style>
        /* CSS-ul rămâne la fel pentru designul tău. L-am scurtat pentru claritate */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        :root { --primary: #1a1a1a; --accent: #e67e22; }
        body { background: #1a1a1a; color: white; min-height: 100vh; }
        .page-view { display: none; padding: 100px 20px; }
        .active-view { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: auto; }
        .card { background: #333; padding: 15px; border-radius: 8px; cursor: pointer; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        .btn { background: var(--accent); color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Meniu Simplificat -->
    <header style="padding: 20px; position: fixed; width: 100%; background: #000;">
        <button class="nav-btn" data-target="acasa">Acasă</button>
        <button class="nav-btn" data-target="proiecte">Proiecte</button>
    </header>

    <main>
        <div id="view-acasa" class="page-view active-view"><h1>Bine ai venit!</h1></div>
        
        <!-- Aici se vor genera automat coperțile -->
        <div id="view-proiecte" class="page-view">
            <h2 style="text-align:center; margin-bottom: 40px;">Proiectele Noastre</h2>
            <div id="grid-proiecte" class="grid"></div>
        </div>

        <!-- Aici se vor genera paginile individuale -->
        <div id="container-galerii"></div>
    </main>

    <script>
        /**
         * MODIFICĂ DOAR DE AICI!
         * Adaugă un proiect nou aici și totul se va crea automat.
         */
        const projects = {
            'kaufland': { title: 'Kaufland', cover: 'images/Proiecte/Kaufland/PozaProiectKaufland1.jpeg', images: ['images/Proiecte/Kaufland/PozaProiectKaufland1.jpeg', 'images/Proiecte/Kaufland/PozaProiectKaufland2.jpeg'] },
            'standuri': { title: 'Stand-uri', cover: 'images/Proiecte/Standuri/PozaCoperta.jpeg', images: ['images/Proiecte/Standuri/Poza1.jpeg', 'images/Proiecte/Standuri/Poza2.jpeg'] }
        };

        // --- Logica de generare automată (nu trebuie să atingi aici) ---
        function init() {
            const grid = document.getElementById('grid-proiecte');
            const galeries = document.getElementById('container-galerii');

            for (const key in projects) {
                const p = projects[key];
                // Creează coperta
                grid.innerHTML += `<div class="card nav-btn" data-target="${key}"><img src="${p.cover}"><h3>${p.title}</h3></div>`;
                // Creează pagina de galerie
                galeries.innerHTML += `
                    <div id="view-${key}" class="page-view">
                        <button class="btn nav-btn" data-target="proiecte">Înapoi</button>
                        <h2>${p.title}</h2>
                        <div class="grid">${p.images.map(img => `<div class="card"><img src="${img}"></div>`).join('')}</div>
                    </div>`;
            }
            // Adaugă event listeners
            document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', (e) => {
                document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));
                document.getElementById('view-' + e.currentTarget.getAttribute('data-target')).classList.add('active-view');
            }));
        }
        init();
    </script>
</body>
</html>                    <div class="nav-btn" data-target="pescobar" style="cursor:pointer;"><h3 style="text-align:center;">Pescobar</h3><div class="product-card"><div class="product-image"><img src="images/Proiecte/Pescobar/PozaCoperta.jpeg"></div></div></div>
                    <div class="nav-btn" data-target="balustrade" style="cursor:pointer;"><h3 style="text-align:center;">Balustrade</h3><div class="product-card"><div class="product-image"><img src="images/Proiecte/Balustrade/PozaBalustrada1.jpeg"></div></div></div>
                    <div class="nav-btn" data-target="speciale" style="cursor:pointer;"><h3 style="text-align:center;">Proiecte Speciale</h3><div class="product-card"><div class="product-image"><img src="images/Proiecte/Speciale/PozaCoperta.jpeg"></div></div></div>
                    <div class="nav-btn" data-target="standuri" style="cursor:pointer;"><h3 style="text-align:center;">Stand-uri</h3><div class="product-card"><div class="product-image"><img src="images/Proiecte/Standuri/PozaCoperta.jpeg"></div></div></div>
                    <div class="nav-btn" data-target="porti-garduri" style="cursor:pointer;"><h3 style="text-align:center;">Porți & Garduri</h3><div class="product-card"><div class="product-image"><img src="images/Proiecte/PortiGarduri/PozaCoperta.jpeg"></div></div></div>
                </div>
            </div></div>
        </div>

        <!-- Pagini Galerie -->
        <div id="view-kaufland" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Kaufland</h2><div id="container-kaufland" class="grid"></div></div></div></div>
        <div id="view-penny" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Penny</h2><div id="container-penny" class="grid"></div></div></div></div>
        <div id="view-insule" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Insule</h2><div id="container-insule" class="grid"></div></div></div></div>
        <div id="view-pescobar" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Pescobar</h2><div id="container-pescobar" class="grid"></div></div></div></div>
        <div id="view-balustrade" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Balustrade</h2><div id="container-balustrade" class="grid"></div></div></div></div>
        <div id="view-speciale" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Proiecte Speciale</h2><div id="container-speciale" class="grid"></div></div></div></div>
        <div id="view-standuri" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Stand-uri</h2><div id="container-standuri" class="grid"></div></div></div></div>
        <div id="view-porti-garduri" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><button class="btn nav-btn" data-target="proiecte">&larr; Înapoi</button><h2 class="section-title">Porți & Garduri</h2><div id="container-porti-garduri" class="grid"></div></div></div></div>
        <div id="view-contact" class="page-view parallax-bg"><div class="content-container"><div class="glass-panel"><h2>Contact</h2><p>Pitești, România</p></div></div></div>
    </main>

    <script>
        const productsDatabase = [
            { id: 1, category: 'kaufland', img: 'images/Proiecte/Kaufland/PozaProiectKaufland1.jpeg' },
            { id: 2, category: 'penny', img: 'images/Proiecte/Penny/Poza1.jpeg' },
            { id: 3, category: 'insule', img: 'images/Proiecte/Insule/PozaInsule1.jpeg' },
            { id: 4, category: 'pescobar', img: 'images/Proiecte/Pescobar/Poza1.jpeg' },
            { id: 5, category: 'balustrade', img: 'images/Proiecte/Balustrade/PozaBalustrada1.jpeg' },
            { id: 6, category: 'speciale', img: 'images/Proiecte/Speciale/Poza1.jpeg' },
            { id: 7, category: 'standuri', img: 'images/Proiecte/Standuri/PozaStan1.jpeg' },
            { id: 8, category: 'porti-garduri', img: 'images/Proiecte/PortiGarduri/Poza1.jpeg' }
        ];

        function renderCatalogue() {
            const categories = ['kaufland', 'penny', 'insule', 'pescobar', 'balustrade', 'speciale', 'standuri', 'porti-garduri'];
            categories.forEach(cat => {
                const container = document.getElementById(`container-${cat}`);
                if (container) {
                    container.innerHTML = productsDatabase.filter(p => p.category === cat)
                        .map(p => `<div class="product-card"><div class="product-image"><img src="${p.img}"></div></div>`).join('');
                }
            });
        }
        
        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));
            const view = document.getElementById(`view-${pageId}`);
            if(view) view.classList.add('active-view');
            document.getElementById('nav-links').classList.remove('show-menu');
            window.scrollTo(0, 0);
        }

        document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', (e) => showPage(e.currentTarget.getAttribute('data-target'))));
        document.getElementById('hamburger-menu').addEventListener('click', () => document.getElementById('nav-links').classList.toggle('show-menu'));
        renderCatalogue();
    </script>
</body>
</html>
