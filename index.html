<script>
    // --- DATABASE POZE ---
    const productsDatabase = [
        { id: 1, category: 'kaufland', img: 'images/Proiecte/Kaufland/PozaProiectKaufland1.jpeg' },
        { id: 2, category: 'kaufland', img: 'images/Proiecte/Kaufland/PozaProiectKaufland2.jpeg' },
        { id: 3, category: 'standuri', img: 'images/Proiecte/Standuri/PozaStand1.jpeg' },
        { id: 4, category: 'penny', img: 'images/Proiecte/Penny/PozaProiectPenny1.jpeg' },
        { id: 5, category: 'penny', img: 'images/Proiecte/Penny/PozaProiectPenny2.jpeg' },
        { id: 6, category: 'insule', img: 'images/Proiecte/Insule/Poza1.jpeg' },
        { id: 7, category: 'pescobar', img: 'images/Proiecte/Pescobar/Poza1.jpeg' },
        { id: 8, category: 'balustrade', img: 'images/Proiecte/Balustrade/Poza1.jpeg' },
        { id: 9, category: 'speciale', img: 'images/Proiecte/Speciale/Poza1.jpeg' },
        { id: 10, category: 'porti-garduri', img: 'images/Proiecte/PortiGarduri/Poza1.jpeg' },
        { id: 11, category: 'porti-garduri', img: 'images/Proiecte/PortiGarduri/Poza2.jpeg' },
        { id: 12, category: 'garduri', img: 'images/garduri/Gard1.jpeg' },
        { id: 13, category: 'mese', img: 'images/mese/Masa1.jpeg' },
        { id: 14, category: 'decoratiuni', img: 'images/decoratiuni/Deco1.jpeg' }
    ];

    // --- INCARCARE POZE IN GRILE ---
    function renderCatalogue() {
        // AM ADĂUGAT 'standuri' AICI:
        const categories = ['garduri', 'mese', 'decoratiuni', 'kaufland', 'penny', 'insule', 'pescobar', 'balustrade', 'speciale', 'porti-garduri', 'standuri'];
        
        categories.forEach(cat => {
            const container = document.getElementById(`container-${cat}`);
            if (!container) return;
            
            const filtered = productsDatabase.filter(p => p.category === cat);
            
            if (filtered.length === 0) {
                container.innerHTML = `<p class="empty-message">Noi imagini vor fi adăugate în curând!</p>`;
                return;
            }

            container.innerHTML = filtered.map(prod => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${prod.img}" alt="Proiect Total Metal Construct" loading="lazy">
                    </div>
                </div>
            `).join('');
        });
    }

    // --- SISTEM DE NAVIGARE INTRE PAGINI ---
    function showPage(pageId) {
        document.querySelectorAll('.page-view').forEach(view => {
            view.classList.remove('active-view');
        });

        document.querySelectorAll('nav ul li a').forEach(link => {
            link.classList.remove('active');
        });

        const viewElement = document.getElementById(`view-${pageId}`);
        if (viewElement) viewElement.classList.add('active-view');

        // AM ADĂUGAT 'standuri' AICI PENTRU A PĂSTRA BUTONUL "PROIECTE" ACTIV:
        const listaProiecte = ['kaufland', 'penny', 'insule', 'pescobar', 'balustrade', 'speciale', 'porti-garduri', 'standuri'];

        if (['garduri', 'mese', 'decoratiuni'].includes(pageId)) {
            document.getElementById('nav-categorii').classList.add('active');
        } else if (['laser', 'abkant', 'sablare', 'vopsitorie'].includes(pageId)) {
            // Pagini tehnologice
        } else if (listaProiecte.includes(pageId)) {
            const activeNav = document.getElementById('nav-proiecte');
            if (activeNav) activeNav.classList.add('active');
        } else {
            const activeNav = document.getElementById(`nav-${pageId}`);
            if (activeNav) activeNav.classList.add('active');
        }

        document.getElementById('nav-links').classList.remove('show-menu');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- EVENT LISTENERS ---
    document.addEventListener('DOMContentLoaded', () => {
        renderCatalogue();

        const hamburger = document.getElementById('hamburger-menu');
        const navLinks = document.getElementById('nav-links');
        
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('show-menu');
        });

        document.querySelectorAll('.nav-btn, .logo').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const target = e.currentTarget.getAttribute('data-target');
                if (target) showPage(target);
            });
        });
    });
</script>
